<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="sun-body" cx="35%" cy="30%">
      <stop offset="0%" stop-color="#fef08a"/>
      <stop offset="35%" stop-color="#fbbf24"/>
      <stop offset="70%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#b45309"/>
    </radialGradient>
  </defs>
  <!-- Sun rays -->
  <g>
    <animateTransform attributeName="transform" type="rotate" from="0 32 32" to="360 32 32" dur="20s" repeatCount="indefinite"/>
    <path d="M32 4 L34 12 L30 12 Z" fill="#fbbf24" opacity="0.5"/>
    <path d="M32 60 L34 52 L30 52 Z" fill="#fbbf24" opacity="0.5"/>
    <path d="M4 32 L12 34 L12 30 Z" fill="#fbbf24" opacity="0.5"/>
    <path d="M60 32 L52 34 L52 30 Z" fill="#fbbf24" opacity="0.5"/>
    <path d="M12.7 12.7 L18.3 18.3 L15.2 21.4 L9.5 15.8 Z" fill="#f59e0b" opacity="0.35"/>
    <path d="M51.3 51.3 L45.7 45.7 L48.8 42.6 L54.5 48.2 Z" fill="#f59e0b" opacity="0.35"/>
    <path d="M12.7 51.3 L18.3 45.7 L21.4 48.8 L15.8 54.5 Z" fill="#f59e0b" opacity="0.35"/>
    <path d="M51.3 12.7 L45.7 18.3 L42.6 15.2 L48.2 9.5 Z" fill="#f59e0b" opacity="0.35"/>
  </g>
  <!-- Corona glow -->
  <circle cx="32" cy="32" r="17" fill="none" stroke="#fbbf24" stroke-width="2" opacity="0.2">
    <animate attributeName="r" values="17;19;17" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.2;0.35;0.2" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="32" cy="32" r="20" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0.12">
    <animate attributeName="r" values="20;23;20" dur="4s" repeatCount="indefinite"/>
  </circle>
  <!-- Sun body -->
  <circle cx="32" cy="32" r="15" fill="url(#sun-body)">
    <animate attributeName="r" values="15;15.5;15" dur="3s" repeatCount="indefinite"/>
  </circle>
  <!-- Highlight -->
  <ellipse cx="27" cy="26" rx="5" ry="4" fill="#fef9c3" opacity="0.25"/>
</svg>
